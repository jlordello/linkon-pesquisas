name: Deploy para a VPS

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Pegar o codigo atualizado do Github
        uses: actions/checkout@v4

      - name: Enviar os arquivos para a VPS via SCP/Rsync
        uses: appleboy/scp-action@v0.1.7
        with:
          host: "163.176.41.99"
          username: "ubuntu"
          key: ${{ secrets.VPS_SSH_KEY }}
          port: 22
          source: "./*"
          target: "/var/www/pesquisa"
